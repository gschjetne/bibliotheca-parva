# Dev/agent container for Bibliotheca Parva (the Cloudflare Workers app).
#
#   agent - dev environment + Claude Code; run it with
#           `docker compose exec agent claude --dangerously-skip-permissions`
#
# Usage:
#   ./docker/agent.sh            # build, start, drop into a shell
# or manually:
#   docker compose up -d
#   docker compose exec agent bash

services:
  agent:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    environment:
      # Keep all of Claude Code's state (credentials + config) under one dir so a
      # single named volume persists the login across container restarts, fully
      # isolated from the host's ~/.claude (no clobbering the host config).
      CLAUDE_CONFIG_DIR: /home/dev/.claude
    volumes:
      # The project itself.
      - .:/workspace
      # Container-local, persistent Claude Code config/credentials.
      - claude_home:/home/dev/.claude
    ports:
      # Host ${WEB_HOST_PORT} -> container 8000 (the vite dev server; run it with
      # `npm run dev -- --host 0.0.0.0 --port 8000`).
      - '${WEB_HOST_PORT:-8055}:8000'
    # Keep the container alive so you can exec into it interactively.
    command: ['sleep', 'infinity']

volumes:
  claude_home:
