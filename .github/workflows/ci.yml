name: CI

# Quality gates for Bibliotheca Parva. Deployment is NOT here — the Cloudflare
# build system deploys from the connected repo on its own. This pipeline only
# proves the code is correct: static analysis (format, lint, types, unused code),
# unit tests, mutation testing, and the Gherkin acceptance suite (features/*.feature,
# driven by the Playwright specs in e2e/).

on:
  push:
    branches: [master]
  pull_request:

# A newer push to the same branch/PR cancels the older, still-running pipeline.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Format, lint, types, unused code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `check` runs `wrangler types` + `svelte-kit sync`, generating the ambient
      # types that svelte-check, ESLint (type-aware) and knip all rely on.
      - name: Type-check (svelte-check)
        run: npm run check
      - name: Format & lint (Prettier + ESLint)
        run: npm run lint
      - name: Unused files, exports, and dependencies (knip)
        run: npm run knip

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Generate ./$types and other SvelteKit ambient files the sources import.
      - run: npm run prepare
      - run: npm run test:unit -- --run

  mutation:
    name: Mutation testing (Stryker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `svelte-kit sync && stryker run` — fails the build below the 80% score
      # threshold configured in stryker.conf.json.
      - run: npm run test:mutation
      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: stryker-report
          path: reports/mutation
          if-no-files-found: ignore

  acceptance:
    name: Acceptance tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # Mirror local dev: open the Cloudflare Access gate so `wrangler dev` (the
      # `preview` server Playwright boots) serves without an Access JWT. The real
      # `.dev.vars` is gitignored, so CI recreates it.
      - name: Open the Access gate for the local Worker
        run: echo "ACCESS_BYPASS=true" > .dev.vars
      # The full ~1700-book local seed is generated from a private backup that is
      # never committed; load the small committed fixture the specs actually need.
      - name: Prepare local D1 (migrate + seed)
        run: |
          npx wrangler d1 migrations apply bibliotheca-parva --local
          npx wrangler d1 execute bibliotheca-parva --local --file=./e2e/seed.test.sql
      # Playwright's webServer builds the Worker (`npm run build`) and serves it
      # with `wrangler dev` against the local D1 prepared above.
      - name: Run acceptance tests
        run: npx playwright test
      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
