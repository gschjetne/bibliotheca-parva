version: 2
updates:
  # npm dependencies. The project pins many ^-ranged dev tools (Vite, Vitest,
  # Svelte, Wrangler); the CI quality gates vet each bump.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR per week for routine minor/patch bumps, to keep the noise down;
      # majors still come as individual PRs so they can be reviewed on their own.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in CI up to date too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
